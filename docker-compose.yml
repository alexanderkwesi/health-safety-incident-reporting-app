services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: safetyhub
      POSTGRES_USER: safetyhub
      POSTGRES_PASSWORD: safetyhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safetyhub -d safetyhub"]
      interval: 5s
      timeout: 5s
      retries: 8

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://safetyhub:safetyhub@db:5432/safetyhub
      JWT_SECRET_KEY: change-this-in-production
      DEMO_USERNAME: admin
      DEMO_PASSWORD: SafetyHub123!
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
